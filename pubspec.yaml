name: masum_calc_pro_v2
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.1
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.3

  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  google_sign_in: 6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_foreground: "assets/images/icon_foreground.png"
  adaptive_icon_background: "#000000"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/icon.png"
    background_color: "#000000"
    theme_color: "#000000"

flutter_native_splash:
  color: "#000000"
  image: assets/images/icon_splash.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#000000"
    image: assets/images/icon_splash.png
